name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 10
          - php: '8.1'
            laravel: '10.*'
            testbench: '8.*'
            phpunit: '10.*'
          - php: '8.2'
            laravel: '10.*'
            testbench: '8.*'
            phpunit: '10.*'
          - php: '8.3'
            laravel: '10.*'
            testbench: '8.*'
            phpunit: '10.*'

          # Laravel 11
          - php: '8.2'
            laravel: '11.*'
            testbench: '9.*'
            phpunit: '11.*'
          - php: '8.3'
            laravel: '11.*'
            testbench: '9.*'
            phpunit: '11.*'
          - php: '8.4'
            laravel: '11.*'
            testbench: '9.*'
            phpunit: '11.*'

          # Laravel 12
          - php: '8.2'
            laravel: '12.*'
            testbench: '10.*'
            phpunit: '11.*'
          - php: '8.3'
            laravel: '12.*'
            testbench: '10.*'
            phpunit: '11.*'
          - php: '8.4'
            laravel: '12.*'
            testbench: '10.*'
            phpunit: '11.*'
          - php: '8.5'
            laravel: '12.*'
            testbench: '10.*'
            phpunit: '11.*'

          # Laravel 13
          - php: '8.3'
            laravel: '13.*'
            testbench: '11.*'
            phpunit: '12.*'
          - php: '8.4'
            laravel: '13.*'
            testbench: '11.*'
            phpunit: '12.*'
          - php: '8.5'
            laravel: '13.*'
            testbench: '11.*'
            phpunit: '12.*'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/http:${{ matrix.laravel }}" "illuminate/support:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "phpunit/phpunit:${{ matrix.phpunit }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit
